# LoRA fine-tuning for KSS (3h, salt_n mode) on RTX 3090 (24GB VRAM)
# Based on paper settings: 
# - LoRA rank 64 for prompt adapter, rank 16 for DiT LoRA
# - AdamW optimizer, learning rate 1e-5
# - 24kHz sample rate

hydra:
  run:
    dir: ckpts/${model.name}_${model.mel_spec.mel_spec_type}_${model.tokenizer}_${datasets.name}_lora/${now:%Y-%m-%d}/${now:%H-%M-%S}

datasets:
  name: KSS_3h_salt_n
  load_path: data/KSS_3h_salt_n  # Output folder from prepare_coreaspeech_salt_n.py
  batch_size_per_gpu: 3200  # Adjusted for 24GB VRAM (A100 uses 19200, so quarter for RTX3090)
  batch_size_type: frame
  max_samples: 64
  num_workers: 8

optim:
  epochs: 10000
  learning_rate: 1e-5
  num_warmup_updates: 1000
  grad_accumulation_steps: 6
  max_grad_norm: 1.0
  bnb_optimizer: False

model:
  name: F5TTS_Base
  tokenizer: custom
  # tokenizer_path: /workspace/datasets/KSS_3h_salt_n/vocab.txt
  tokenizer_path: ckpts/pretrained/vocab_pretr.txt # 영어/중국어 vocab 보존
  backbone: DiT
  arch:
    dim: 1024
    depth: 22
    heads: 16
    ff_mult: 2
    text_dim: 512
    text_mask_padding: False
    conv_layers: 4
    pe_attn_head: 1
    attn_backend: torch
    attn_mask_enabled: False
    checkpoint_activations: False
  mel_spec:
    target_sample_rate: 24000
    n_mel_channels: 100
    hop_length: 256
    win_length: 1024
    n_fft: 1024
    mel_spec_type: vocos
  vocoder:
    is_local: False
    local_path: null

ckpts:
  pretrained_path: ckpts/pretrained/model_pretrained_1200000.pt  # Base weights for LoRA
  lora_r: 16         # DiT LoRA rank 16 (Reverting to original code setting)
  lora_alpha: 32     # alpha usually 2x rank
  lora_target_modules: ["to_q", "to_k", "to_v", "to_out.0", "input_embed.proj"]
  logger: wandb
  log_samples: True
  save_per_updates: 5000
  keep_last_n_checkpoints: -1
  last_per_updates: 2500
  save_dir: ckpts/${model.name}_${model.mel_spec.mel_spec_type}_${model.tokenizer}_${datasets.name}_lora
